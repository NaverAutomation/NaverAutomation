appId: com.naverauto.app
productName: Naver Auto
directories:
  output: dist_electron
  buildResources: assets
files:
  - "dist/**/*"
  - "src/**/*"
  - "package.json"
  - "node_modules/**/*"
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: assets/icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  shortcutName: Naver Auto
publish:
  provider: github
  owner: NaverAutomation
  repo: NaverAutomation
  releaseType: draft
