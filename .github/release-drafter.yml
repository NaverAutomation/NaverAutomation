# Release meta
name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
draft: true
prerelease: false

# Filtering
exclude-labels:
  - 'skip-changelog'
include-labels:
  - '🎁 feature'
  - '🔨 fix'
  - '📋 docs'
  - '🧼 refactor'
  - '🪄 setting'
  - '🎫 test'
  - '🚀 deploy'

# Grouping
categories:
  - title: '🎁 새로운 기능이 추가되었어요'
    labels:
      - '🎁 feature'
  - title: '🐞 자잘한 버그를 수정했어요'
    labels:
      - '🔨 fix'
  - title: '🐬 코드를 개선했어요'
    labels:
      - '📋 docs'
      - '🧼 refactor'
      - '🪄 setting'
      - '🎫 test'
      - '🚀 deploy'

# Rendered note body
change-template: '- $TITLE (#$NUMBER) @$AUTHOR'
template: |
  ## 📝 이번 버전의 변경사항

  $CHANGES

  **전체 변경사항**:
  https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
no-changes-template: '변경사항이 없어요'

# Version resolution from PR labels
version-resolver:
  major:
    labels:
      - '✨ major'
  minor:
    labels:
      - '✨ minor'
  patch:
    labels:
      - '✨ patch'
  default: patch