name: Build/Release

on:
  pull_request:
    types: [opened, reopened, synchronize, labeled, unlabeled]
  push:
    tags:
      - 'v*'

jobs:
  release_drafter:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Release Drafter
        uses: release-drafter/release-drafter@v7.2.0
        with:
          config-name: release-drafter.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate tag and app version match
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if (-not $tag.StartsWith('v')) {
            Write-Error "Tag must start with v. Actual: $tag"
            exit 1
          }

          $tagVersion = $tag.Substring(1)
          $packageVersion = node -p "require('./package.json').version"

          Write-Host "Tag version: $tagVersion"
          Write-Host "package.json version: $packageVersion"

          if ($tagVersion -ne $packageVersion) {
            Write-Error "Version mismatch. Tag=$tagVersion package.json=$packageVersion"
            exit 1
          }

      - name: Build Web App
        run: npm run build

      - name: Build and Publish Electron App
        run: npx electron-builder build --win --publish always
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish_release_notes:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Resolve version
        id: version
        run: echo "release_version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Compute release notes (dry-run)
        id: drafter
        uses: release-drafter/release-drafter@v7.2.0
        with:
          config-name: release-drafter.yml
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          version: ${{ steps.version.outputs.release_version }}
          dry-run: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update release with computed notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
          BODY: ${{ steps.drafter.outputs.body }}
        run: |
          echo "$BODY" > /tmp/release_notes.md
          gh release edit "$TAG" --notes-file /tmp/release_notes.md --latest --repo "$GH_REPO"

      - name: Clean up stale draft releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh api "repos/${GH_REPO}/releases" \
            --jq '.[] | select(.draft == true) | .id' | \
            while IFS= read -r id; do
              echo "Deleting stale draft release id: $id"
              gh api -X DELETE "repos/${GH_REPO}/releases/${id}" || true
            done
