name: Build/Release

on:
  pull_request:
    types: [opened, reopened, synchronize, labeled, unlabeled]
  push:
    tags:
      - 'v*'

jobs:
  release_drafter:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Release Drafter
        uses: release-drafter/release-drafter@v7.2.0
        with:
          config-name: release-drafter.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate tag and app version match
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if (-not $tag.StartsWith('v')) {
            Write-Error "Tag must start with v. Actual: $tag"
            exit 1
          }

          $tagVersion = $tag.Substring(1)
          $packageVersion = node -p "require('./package.json').version"

          Write-Host "Tag version: $tagVersion"
          Write-Host "package.json version: $packageVersion"

          if ($tagVersion -ne $packageVersion) {
            Write-Error "Version mismatch. Tag=$tagVersion package.json=$packageVersion"
            exit 1
          }

      - name: Build Web App
        run: npm run build

      - name: Build and Publish Electron App
        run: npx electron-builder build --win --publish always
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish_release_notes:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Publish release notes and clean up drafts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="${GITHUB_REF_NAME}"

          # 가장 최근에 업데이트된 draft 릴리즈 노트 가져오기
          DRAFT=$(gh api "repos/${GH_REPO}/releases" \
            --jq '[.[] | select(.draft == true)] | sort_by(.updated_at) | reverse | .[0]')

          DRAFT_ID=$(echo "$DRAFT" | jq -r '.id // empty')
          DRAFT_BODY=$(echo "$DRAFT" | jq -r '.body // empty')

          if [ -n "$DRAFT_ID" ] && [ -n "$DRAFT_BODY" ] && [ "$DRAFT_BODY" != "null" ]; then
            echo "Updating release $TAG with draft notes..."
            echo "$DRAFT_BODY" > /tmp/release_notes.md
            gh release edit "$TAG" --notes-file /tmp/release_notes.md --latest
          else
            echo "No valid draft notes found, using auto-generated notes..."
            gh release edit "$TAG" --generate-notes --latest
          fi

          # 남아있는 stale draft 릴리즈 전부 삭제
          gh api "repos/${GH_REPO}/releases" \
            --jq '.[] | select(.draft == true) | .id' | \
            while IFS= read -r id; do
              echo "Deleting stale draft release id: $id"
              gh api -X DELETE "repos/${GH_REPO}/releases/${id}" || true
            done

