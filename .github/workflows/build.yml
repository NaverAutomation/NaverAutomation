name: Build/Release

on:
  pull_request:
    types: [opened, reopened, synchronize, labeled, unlabeled]
  push:
    tags:
      - 'v*'

jobs:
  release_drafter:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Release Drafter
        uses: release-drafter/release-drafter@v7.2.0
        with:
          config-name: release-drafter.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate tag and app version match
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if (-not $tag.StartsWith('v')) {
            Write-Error "Tag must start with v. Actual: $tag"
            exit 1
          }

          $tagVersion = $tag.Substring(1)
          $packageVersion = node -p "require('./package.json').version"

          Write-Host "Tag version: $tagVersion"
          Write-Host "package.json version: $packageVersion"

          if ($tagVersion -ne $packageVersion) {
            Write-Error "Version mismatch. Tag=$tagVersion package.json=$packageVersion"
            exit 1
          }

      - name: Build Web App
        run: npm run build

      - name: Build and Publish Electron App
        run: npx electron-builder build --win --publish always
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish_release_notes:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Resolve release metadata
        id: release_meta
        run: |
          echo "tag_name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "release_version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish drafted release notes
        uses: release-drafter/release-drafter@v7.2.0
        with:
          config-name: release-drafter.yml
          tag: ${{ steps.release_meta.outputs.tag_name }}
          name: ${{ steps.release_meta.outputs.tag_name }}
          version: ${{ steps.release_meta.outputs.release_version }}
          publish: true
          latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

